<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Каталог материалов{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <nav class="mb-4 text-center">
            <a href="/" class="btn btn-outline-primary me-2">Главная</a>
            <a href="/materials" class="btn btn-outline-primary me-2">Материалы</a>

            {% if session.logged_in %}
                <a href="/add" class="btn btn-primary me-2">Добавить материал</a>
                <a href="/logout" class="btn btn-outline-danger">Выйти ({{ session.username }})</a>
            {% else %}
                <a href="/login" class="btn btn-primary">Вход</a>
            {% endif %}
        </nav>

        {% block content %}{% endblock %}
    </div>
</body>
</html>
